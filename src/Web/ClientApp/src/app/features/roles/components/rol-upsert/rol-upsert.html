<form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-container">

  <div class="form-header">
    <h2 class="text-xl font-bold text-on-surface"> {{ this.rol() ? 'Editar Rol' : 'Nuevo Rol'}}</h2>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mt-4">

    <div class="md:col-span-1 input-group">
      <label for="nombre" class="label-standard">Nombre *</label>
      <input id="nombre" type="text" formControlName="nombre" class="input-standard">
    </div>

    <div class="md:col-span-3 input-group">
      <label for="descripcion" class="label-standard">Descripción *</label>
      <input id="descripcion" type="text" formControlName="descripcion" class="input-standard">
    </div>

  </div>

  <div class="mt-8 space-y-4">

    @for (grupo of permisosAgrupados(); track grupo.modulo) {

      <div class="flex items-center gap-8 border rounded-xl p-4">

        <!-- MODULO -->
        <div class="min-w-32 font-semibold">
          {{ grupo.modulo }}
        </div>

        <!-- PERMISOS -->
        <div class="flex flex-wrap gap-6">

          @for (permiso of grupo.permisos; track permiso.id) {

            <label class="flex items-center gap-2 cursor-pointer">

              <input
                type="checkbox"
                [checked]="hasPermiso(permiso.id)"
                (change)="togglePermiso(permiso.id, $any($event.target).checked)">

              <span>
              {{ permiso.nombre.split('.')[1] }}
            </span>

            </label>

          }

        </div>

      </div>

    }

    <div class="md:col-span-3">
      @if (errors().length > 0) {

        <div class="flex items-center gap-2 text-on-error-container font-semibold mb-2">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5 text-error">
            <path fill-rule="evenodd"
                  d="M9.401 3.003c1.155-2 4.043-2 5.197 0l7.355 12.748c1.154 2-.29 4.5-2.599 4.5H4.645c-2.309 0-3.752-2.5-2.598-4.5L9.4 3.003zM12 8.25a.75.75 0 01.75.75v3.75a.75.75 0 01-1.5 0V9a.75.75 0 01.75-.75zm0 8.25a.75.75 0 100-1.5.75.75 0 000 1.5z"
                  clip-rule="evenodd"/>
          </svg>
          Error:
        </div>

        <ul class="list-disc list-inside text-sm text-on-error-container/90 space-y-1 ml-1">
          @for (error of errors(); track error) {
            <li>{{ error }}</li>
          }
        </ul>

      }
    </div>


  </div>

  <div class="flex justify-end gap-3 mt-2 pt-4 border-t border-outline-variant">
    <button type="button" (click)="cancel.emit()"
            class="px-4 py-1.5 text-sm font-medium text-on-surface bg-surface border border-outline rounded-md hover:bg-surface-container focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors">
      Cancelar
    </button>
    <button type="submit" [disabled]="form.invalid"
            class="px-4 py-1.5 text-sm font-medium text-on-primary bg-primary rounded-md hover:opacity-90 disabled:opacity-50 disabled:cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors">
      Guardar
    </button>
  </div>

</form>
