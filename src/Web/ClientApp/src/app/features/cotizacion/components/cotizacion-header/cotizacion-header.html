<form [formGroup]="form" class="flex flex-col gap-5 p-4 rounded-lg shadow-sm border border-outline-variant">

  <div class="flex flex-col md:flex-row md:items-center justify-between border-b border-outline-variant pb-4 gap-4">
    <div class="flex items-center gap-4">
      <div class="p-3 bg-(--mat-sys-secondary-container) text-(--mat-sys-on-secondary-container) rounded-xl flex items-center justify-center">
        <mat-icon class="scale-110">article</mat-icon>
      </div>
      <div>
        <h2 class="text-2xl font-bold text-on-surface m-0">Nueva Cotización</h2>
      </div>
    </div>
  </div>

  <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">

    <div class="w-full md:w-1/3">
      <agente-autocomplete (agenteSeleccionado)="onAgenteSeleccionado($event)"></agente-autocomplete>
    </div>

    <label class="inline-flex items-center cursor-pointer gap-3">
      <span class="text-sm font-medium"
            [class.text-primary]="form.controls.isPersonaMoral.value"
            [class.text-on-teritary]="!form.controls.isPersonaMoral.value">
        {{ form.controls.isPersonaMoral.value ? 'Persona Moral' : 'Persona Física' }}
      </span>

      <input type="checkbox" formControlName="isPersonaMoral" class="sr-only peer">

      <div class="relative w-9 h-5 bg-surface-container-high peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-primary/50 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-outline after:content-[''] after:absolute after:top-0.5 after:inset-s-0.5 after:bg-surface after:border-outline after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary">
      </div>
    </label>
  </div>

  <div class="flex flex-row justify-end items-center gap-4">

    <div class="input-group w-36">
      <label for="fecha" class="label-standard">Fecha</label>
      <date-input formControlName="fecha"></date-input>
    </div>

    <div class="input-group w-28">
      <label for="serie" class="label-standard">Serie</label>
      <input id="serie" type="text" formControlName="serie" class="input-standard">
    </div>

    <div class="input-group w-28">
      <label for="folio" class="label-standard">Folio</label>
      <input id="folio" type="text" formControlName="folio" class="input-standard">
    </div>

  </div>

  <div class="grid grid-cols-1 md:grid-cols-12 gap-4">

    <div class="input-group md:col-span-4">
      <label for="cliente" class="label-standard">Cliente</label>
      <input id="cliente" type="text" formControlName="cliente" class="input-standard">
    </div>

    <div class="input-group md:col-span-3">
      <label for="contacto" class="label-standard">Contacto</label>
      <input id="contacto" type="text" formControlName="contacto" class="input-standard">
    </div>

    <div class="input-group md:col-span-3">
      <label for="email" class="label-standard">Email</label>
      <input id="email" type="text" formControlName="email" class="input-standard">
    </div>

    <div class="input-group md:col-span-2">
      <label for="telefono" class="label-standard">Teléfono</label>
      <input id="telefono" type="text" formControlName="telefono" class="input-standard">
    </div>

  </div>

</form>
