<div class="relative  ">

  <img src="/assets/imgs/logo.png" alt="logo" class="absolute top-3 left-3 h-6 w-auto select-none"/>

  <!-- Grid 50/50. Usamos min-h ajustada para que no aparezca scroll y se vean los bordes -->
  <main class="grid md:grid-cols-2 gap-4 sm:gap-6 px-3 sm:px-4 py-3 min-h-[calc(100svh-0px)]">
    <!-- LOGIN FORM -->
    <section class="flex items-center justify-center min-h-svh md:min-h-0">
      <div class="w-full max-w-[520px]">
        <!-- icono -->
        <div
          class="mx-auto mb-6 flex items-center justify-center w-14 h-14 rounded-full bg-emerald-50 text-emerald-700">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
            <path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5Z" stroke="currentColor" stroke-width="1.6"/>
            <path d="M3.5 20.4a8.5 8.5 0 0 1 17 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </div>

        <h1 class="text-2xl md:text-[28px] font-semibold text-neutral-800 text-center">
          Main App
        </h1>
        <p class="mt-2 text-neutral-500 text-center"> Bienvendo! Ingresa tus datos para entrar. </p>

        <!-- Form -->
        <form class="mt-8 space-y-5" [formGroup]="form" (ngSubmit)="submit()">

          <!-- Usuario -->
          <div>
            <label class="block text-sm font-medium text-neutral-700 mb-1.5">Usuario</label>
            <div class="relative">
              <!-- 1 solo icono -->
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-neutral-400 pointer-events-none">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 block" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20a8 8 0 1 1 16 0"/>
      </svg>
    </span>

              <input
                formControlName="userName"
                type="text"
                placeholder="usuario"
                class="w-full h-11 pl-10 pr-3 rounded-xl border border-neutral-300/70 bg-white
             focus:outline-none focus:ring-4 focus:ring-emerald-300/40 focus:border-emerald-600
             text-[15px] placeholder:text-neutral-400"/>
            </div>
          </div>

          <!-- Contraseña -->
          <div>
            <div class="flex items-center justify-between">
              <label class="block text-sm font-medium text-neutral-700 mb-1.5">Contraseña</label>
            </div>

            <div class="relative">
              <!-- Icono candado (1 solo) -->
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-neutral-400 pointer-events-none">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 block" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="4" y="10" width="16" height="10" rx="2" ry="2"/>
        <path d="M8 10V7a4 4 0 1 1 8 0v3"/>
        <path d="M12 15v2"/>
      </svg>
    </span>

              <input
                id="password"
                formControlName="password"
                [type]="showPassword ? 'text' : 'password'"
                placeholder="••••••••"
                class="w-full h-11 pl-10 pr-12 rounded-xl border border-neutral-300/70 bg-white
             focus:outline-none focus:ring-4 focus:ring-emerald-300/40 focus:border-emerald-600
             text-[15px] placeholder:text-neutral-400"
                autocomplete="current-password"/>

              <!-- Toggle mostrar/ocultar -->
              <button type="button"
                      (click)="showPassword = !showPassword"
                      class="absolute right-2 top-1/2 -translate-y-1/2 p-2 rounded-md
                   hover:bg-neutral-100 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-400"
                      [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
                      [attr.aria-pressed]="showPassword">
                <svg *ngIf="!showPassword" class="size-5 text-neutral-500" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     aria-hidden="true">
                  <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20C5 20 2 12 2 12a21.77 21.77 0 0 1 5.17-7.11"/>
                  <path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 10 8 10 8a21.84 21.84 0 0 1-3.17 4.49"/>
                  <path d="M14 14a3 3 0 1 1-4-4"/>
                  <line x1="2" y1="2" x2="22" y2="22"/>
                </svg>
                <svg *ngIf="showPassword" class="size-5 text-neutral-600" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     aria-hidden="true">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12Z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>


            </div>

          </div>

          @if (error) {
            <mat-error class="text-red-600 text-sm mt-1">{{ error }}</mat-error>
          }

          <!-- Remember -->
          <label class="flex items-center gap-2 text-sm text-neutral-700">
            <input type="checkbox" formControlName="remember"
                   class="size-4 rounded border-neutral-300 text-emerald-700 focus:ring-emerald-500"/>
            Recordarme </label>

          <!-- Submit -->
          <button
            class="w-full h-11 rounded-xl bg-emerald-700 text-white font-medium hover:bg-emerald-800 focus:outline-none focus:ring-4 focus:ring-emerald-300/50 transition disabled:opacity-60"
            [disabled]="form.invalid"
            type="submit">
            <span>Ingresar</span>

          </button>
        </form>

        <!-- Footer -->
        <div class="mt-8 text-[12px] text-neutral-400">
          © 2026 • Design By Ricardo Chavez
        </div>
      </div>
    </section>

    <!-- Columna derecha: Imagen (SVG), casi pegada a borde sup/inf/derecho -->
    <!-- Usamos h-full para que iguale la altura del grid y se vea sin scroll -->
    <aside class="hidden md:block rounded-3xl overflow-hidden ring-1 ring-black/20 shadow-2xl h-full ml-auto w-full">
      <svg viewBox="0 0 1200 1400" class="w-full h-full block" preserveAspectRatio="xMidYMid slice">
        <defs>
          <radialGradient id="bg1" cx="50%" cy="50%" r="75%">
            <stop offset="0%" stop-color="#2a363e"/>
            <stop offset="100%" stop-color="#1a2026"/>
          </radialGradient>
          <filter id="glow1" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4"/>
          </filter>
        </defs>
        <rect width="1200" height="1400" fill="url(#bg1)"/>

        <!-- Estrellas pequeñas distribuidas aleatoriamente -->
        <g fill="white" opacity="0.6">
          <!-- Generadas con patrón repetitivo pero variado -->
          <circle cx="100" cy="150" r="1.5"/>
          <circle cx="250" cy="80" r="1"/>
          <circle cx="400" cy="200" r="2"/>
          <circle cx="550" cy="120" r="1.5"/>
          <circle cx="700" cy="60" r="1"/>
          <circle cx="850" cy="190" r="2"/>
          <circle cx="1000" cy="110" r="1.5"/>
          <circle cx="1100" cy="170" r="1"/>
          <!-- más -->
          <circle cx="80" cy="400" r="1"/>
          <circle cx="220" cy="350" r="2"/>
          <circle cx="370" cy="500" r="1.5"/>
          <circle cx="520" cy="420" r="1"/>
          <circle cx="680" cy="550" r="2"/>
          <circle cx="830" cy="480" r="1.5"/>
          <circle cx="980" cy="600" r="1"/>
          <circle cx="1130" cy="520" r="2"/>
          <!-- más -->
          <circle cx="150" cy="700" r="1.5"/>
          <circle cx="300" cy="800" r="1"/>
          <circle cx="450" cy="750" r="2"/>
          <circle cx="600" cy="900" r="1.5"/>
          <circle cx="750" cy="820" r="1"/>
          <circle cx="900" cy="950" r="2"/>
          <circle cx="1050" cy="880" r="1.5"/>
          <circle cx="1150" cy="1000" r="1"/>
          <!-- más -->
          <circle cx="120" cy="1050" r="1"/>
          <circle cx="280" cy="1150" r="2"/>
          <circle cx="440" cy="1100" r="1.5"/>
          <circle cx="600" cy="1250" r="1"/>
          <circle cx="760" cy="1180" r="2"/>
          <circle cx="920" cy="1300" r="1.5"/>
          <circle cx="1080" cy="1220" r="1"/>
        </g>

        <!-- Líneas geométricas abstractas (minimalista) -->
        <g stroke="#66D0D0" stroke-width="1.5" opacity="0.2" fill="none">
          <polyline points="100,700 300,500 500,800 700,600 900,900"/>
          <polyline points="200,400 400,300 600,500 800,400 1000,600"/>
          <line x1="300" y1="200" x2="500" y2="800" stroke-dasharray="3 6" opacity="0.3"/>
          <line x1="800" y1="300" x2="1000" y2="900" stroke-dasharray="2 5" opacity="0.3"/>
        </g>

        <!-- Círculos concéntricos sutiles -->
        <g transform="translate(850, 750)" opacity="0.15" fill="none" stroke="#66D0D0" stroke-width="1">
          <circle cx="0" cy="0" r="100"/>
          <circle cx="0" cy="0" r="140" stroke-dasharray="4 8"/>
          <circle cx="0" cy="0" r="180" stroke-width="0.5"/>
        </g>

        <!-- Logo -->
        <image href="/assets/imgs/logo.png" width="300" height="360" x="50%" y="50%"
               transform="translate(-150,-180)" opacity="0.95"
               style="filter: drop-shadow(0 0 15px rgba(102,208,208,0.4));"/>
      </svg>
    </aside>

  </main>
</div>
